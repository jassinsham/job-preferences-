{% extends "base.html" %}

{% block content %}
<div class="hero-section">
    <h1>Find the job that's right for you.</h1>
    <p>Upload your resume to instantly see which roles match your exact skills and experience.</p>
</div>

<div class="upload-card">
    <form action="/upload_resume" method="post" enctype="multipart/form-data">
        <label for="fileUpload" class="upload-area">
            <svg class="icon" viewBox="0 0 24 24"
                style="width: 48px; height: 48px; color: var(--accent); margin-bottom: 1rem;">
                <path
                    d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z" />
            </svg>
            <h3 style="margin:0 0 8px 0;">Drag and drop your resume here</h3>
            <span style="color: var(--text-secondary); font-size: 0.9rem;">Supports PDF and DOCX files up to 10MB</span>
            <div class="file-input-wrapper" style="margin-top: 2rem; display:block;">
                <input type="file" id="fileUpload" name="file" accept=".pdf,.docx" required>
                <span class="btn btn-secondary">Browse Files</span>
            </div>
        </label>

        <button type="submit" class="btn"
            style="width: 100%; padding: 16px; font-size: 1.15rem; margin-top: 1rem;">Analyze My Resume</button>
    </form>

    {% if error %}
    <div class="error-message">
        <svg class="icon" viewBox="0 0 24 24" style="margin-right:8px;">
            <path
                d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" />
        </svg>
        {{ error }}
    </div>
    {% endif %}
</div>
{% endblock %}
